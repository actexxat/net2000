{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet 2000 - Login</title>
    <link href="{% static 'vendor/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --color-primary: #2563eb;
            --color-danger: #e11d48;
            --color-dark: #0f172a;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(225, 29, 72, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(37, 99, 235, 0.1) 0, transparent 50%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            width: 100%;
            max-width: 440px;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 10;
        }
        .brand-name {
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--color-dark);
            text-transform: uppercase;
        }
        .btn-premium {
            background: linear-gradient(135deg, var(--color-danger) 0%, #be123c 100%);
            border: none;
            padding: 0.9rem;
            border-radius: 12px;
            font-weight: 700;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.4);
            filter: brightness(1.1);
        }
        .btn-premium:active { transform: translateY(0); }
        
        .form-control {
            border-radius: 12px;
            padding: 0.85rem 1rem;
            border: 1.5px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }
        .form-control:focus {
            background: white;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .floating-bg {
            position: absolute;
            width: 200px; height: 200px;
            background: var(--color-danger);
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 1;
            animation: float 15s infinite alternate;
        }
        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }

        /* ── Quick-Picker ── */
        #quick-picker {
            margin-top: 0.5rem;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.35s cubic-bezier(0.4, 0, 0.2, 1),
                        opacity 0.25s ease;
        }
        #quick-picker.open {
            max-height: 220px;
            opacity: 1;
        }
        .qp-inner {
            display: flex;
            flex-wrap: wrap;
            gap: 0.45rem;
            padding: 0.75rem 0.25rem 0.25rem;
            max-height: 200px;
            overflow-y: auto;
        }
        .qp-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.38rem 0.85rem;
            border-radius: 999px;
            border: 1.5px solid #e2e8f0;
            background: #f8fafc;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--color-dark);
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
        }
        .qp-btn .qp-avatar {
            width: 22px; height: 22px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-primary), #7c3aed);
            color: #fff;
            font-size: 0.65rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .qp-btn:hover {
            background: linear-gradient(135deg, #eff6ff, #f0fdf4);
            border-color: var(--color-primary);
            color: var(--color-primary);
            transform: translateY(-1px);
            box-shadow: 0 4px 8px -2px rgba(37, 99, 235, 0.2);
        }
        .qp-btn.active {
            background: linear-gradient(135deg, var(--color-primary), #4f46e5);
            border-color: transparent;
            color: #fff;
            box-shadow: 0 4px 12px -2px rgba(37, 99, 235, 0.45);
        }
        .qp-btn.active .qp-avatar {
            background: rgba(255,255,255,0.25);
        }
        .qp-toggle {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: #94a3b8;
            cursor: pointer;
            border: none;
            background: none;
            padding: 0.2rem 0.1rem;
            transition: color 0.2s;
            font-family: 'Tajawal', sans-serif;
            letter-spacing: 0.3px;
            text-transform: uppercase;
        }
        .qp-toggle:hover { color: var(--color-primary); }
        .qp-toggle .qp-arrow {
            transition: transform 0.3s;
            display: inline-block;
        }
        .qp-toggle.open .qp-arrow { transform: rotate(180deg); }
        .qp-loading { color: #94a3b8; font-size: 0.8rem; padding: 0.5rem; }
    </style>
</head>
<body>
    <div class="floating-bg" style="top: -50px; left: -50px;"></div>
    <div class="floating-bg" style="bottom: -50px; right: -50px; background: var(--color-primary);"></div>

    <div class="login-card">
        <div class="text-center mb-5">
            <div class="bg-white p-3 rounded-circle d-inline-block shadow-sm mb-4" style="width: 100px; height: 100px; border: 1px solid #f1f5f9;">
                <img src="{% static 'img/logo.png' %}" alt="Logo" class="w-100 h-100 object-fit-contain">
            </div>
            <h1 class="brand-name h3 mb-1">INTERNET 2000</h1>
            <p class="text-muted fw-medium">{% trans "Management Portal" %}</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger border-0 shadow-sm mb-4" style="border-radius: 12px;">
            <i class="bi bi-exclamation-circle me-2"></i> {% trans "Invalid username or password." %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <label for="id_username" class="form-label text-muted small fw-bold text-uppercase ms-1 mb-0">{% trans "Username" %}</label>
                    <button type="button" class="qp-toggle" id="qp-toggle-btn" aria-expanded="false" aria-controls="quick-picker">
                        <i class="bi bi-people-fill"></i>
                        {% trans "Quick Pick" %}
                        <span class="qp-arrow"><i class="bi bi-chevron-down" style="font-size:0.7rem;"></i></span>
                    </button>
                </div>
                <div class="position-relative">
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="{% trans 'Enter username' %}" autocomplete="username" required>
                </div>

                <div class="form-check mt-2 ms-1">
                    <input class="form-check-input shadow-none" type="checkbox" id="rememberUsername" style="cursor: pointer; border-color: #cbd5e1;">
                    <label class="form-check-label text-muted small fw-medium user-select-none" for="rememberUsername" style="cursor: pointer;">
                        {% trans "Remember username" %}
                    </label>
                </div>

                <!-- Quick Picker Panel -->
                <div id="quick-picker" role="listbox" aria-label="{% trans 'Select a username' %}">
                    <div class="qp-inner" id="qp-inner">
                        <span class="qp-loading"><i class="bi bi-arrow-repeat spin me-1"></i>{% trans "Loading…" %}</span>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label for="id_password" class="form-label text-muted small fw-bold text-uppercase ms-1">{% trans "Password" %}</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-premium">
                    {% trans "LOGIN TO DASHBOARD" %} <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </div>
        </form>
        
        <div class="mt-5 text-center">
            <a href="/" class="text-decoration-none text-muted small fw-bold hover-opacity-100">
                <i class="bi bi-arrow-left me-1"></i> {% trans "Back to Application" %}
            </a>
        </div>
    </div>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spin { display: inline-block; animation: spin 1s linear infinite; }
    </style>

    <script>
    (function () {
        const toggleBtn  = document.getElementById('qp-toggle-btn');
        const picker     = document.getElementById('quick-picker');
        const inner      = document.getElementById('qp-inner');
        const usernameIn = document.getElementById('id_username');
        const passwordIn = document.getElementById('id_password');

        let loaded = false;
        let isOpen = false;

        function openPicker() {
            isOpen = true;
            picker.classList.add('open');
            toggleBtn.classList.add('open');
            toggleBtn.setAttribute('aria-expanded', 'true');
            if (!loaded) fetchUsernames();
        }

        function closePicker() {
            isOpen = false;
            picker.classList.remove('open');
            toggleBtn.classList.remove('open');
            toggleBtn.setAttribute('aria-expanded', 'false');
        }

        toggleBtn.addEventListener('click', () => isOpen ? closePicker() : openPicker());

        function fetchUsernames() {
            fetch('/api/usernames/')
                .then(r => r.json())
                .then(data => {
                    loaded = true;
                    inner.innerHTML = '';
                    const users = data.usernames || [];

                    if (users.length === 0) {
                        inner.innerHTML = '<span class="qp-loading text-muted">{% trans "No users found." %}</span>';
                        return;
                    }

                    users.forEach(name => {
                        const btn = document.createElement('button');
                        btn.type = 'button';
                        btn.className = 'qp-btn';
                        btn.setAttribute('role', 'option');
                        btn.setAttribute('aria-label', name);

                        const initials = name.slice(0, 2).toUpperCase();
                        btn.innerHTML = `<span class="qp-avatar">${initials}</span>${name}`;

                        btn.addEventListener('click', () => {
                            // Fill the username field
                            usernameIn.value = name;

                            // Highlight active chip
                            inner.querySelectorAll('.qp-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');

                            // Close panel and focus password
                            setTimeout(() => {
                                closePicker();
                                passwordIn.focus();
                            }, 180);
                        });

                        inner.appendChild(btn);
                    });

                    // If a username was already typed, pre-select the matching chip
                    highlightCurrent();
                })
                .catch(() => {
                    inner.innerHTML = '<span class="qp-loading text-danger"><i class="bi bi-wifi-off me-1"></i>{% trans "Could not load users." %}</span>';
                });
        }

        function highlightCurrent() {
            const current = usernameIn.value.trim().toLowerCase();
            if (!current) return;
            inner.querySelectorAll('.qp-btn').forEach(btn => {
                const match = btn.getAttribute('aria-label').toLowerCase() === current;
                btn.classList.toggle('active', match);
            });
        }

        // Keep chip in sync when someone types manually
        usernameIn.addEventListener('input', highlightCurrent);

        // Remember Username Logic
        const rememberCb = document.getElementById('rememberUsername');
        const savedUser = localStorage.getItem('net2000_saved_username');
        if (savedUser) {
            usernameIn.value = savedUser;
            rememberCb.checked = true;
        }

        document.querySelector('form').addEventListener('submit', () => {
            if (rememberCb.checked) {
                localStorage.setItem('net2000_saved_username', usernameIn.value.trim());
            } else {
                localStorage.removeItem('net2000_saved_username');
            }
        });
    })();
    </script>
</body>
</html>
