{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet 2000 - Login</title>
    <link href="{% static 'vendor/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --color-primary: #2563eb;
            --color-danger: #e11d48;
            --color-dark: #0f172a;
        }
        body {
            font-family: 'Tajawal', sans-serif;
            background-color: #f8fafc;
            background-image: 
                radial-gradient(at 0% 0%, rgba(37, 99, 235, 0.1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(225, 29, 72, 0.05) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgba(37, 99, 235, 0.1) 0, transparent 50%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            position: relative;
            z-index: 10;
        }
        .brand-name {
            font-weight: 800;
            letter-spacing: -1px;
            color: var(--color-dark);
            text-transform: uppercase;
        }
        .btn-premium {
            background: linear-gradient(135deg, var(--color-danger) 0%, #be123c 100%);
            border: none;
            padding: 0.9rem;
            border-radius: 12px;
            font-weight: 700;
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.5px;
        }
        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(225, 29, 72, 0.4);
            filter: brightness(1.1);
        }
        .btn-premium:active { transform: translateY(0); }
        
        .form-control {
            border-radius: 12px;
            padding: 0.85rem 1rem;
            border: 1.5px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.2s;
        }
        .form-control:focus {
            background: white;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }
        .floating-bg {
            position: absolute;
            width: 200px; height: 200px;
            background: var(--color-danger);
            filter: blur(80px);
            opacity: 0.15;
            border-radius: 50%;
            z-index: 1;
            animation: float 15s infinite alternate;
        }
        @keyframes float {
            from { transform: translate(0, 0); }
            to { transform: translate(50px, 50px); }
        }
    </style>
</head>
<body>
    <div class="floating-bg" style="top: -50px; left: -50px;"></div>
    <div class="floating-bg" style="bottom: -50px; right: -50px; background: var(--color-primary);"></div>

    <div class="login-card">
        <div class="text-center mb-5">
            <div class="bg-white p-3 rounded-circle d-inline-block shadow-sm mb-4" style="width: 100px; height: 100px; border: 1px solid #f1f5f9;">
                <img src="{% static 'img/logo.png' %}" alt="Logo" class="w-100 h-100 object-fit-contain">
            </div>
            <h1 class="brand-name h3 mb-1">INTERNET 2000</h1>
            <p class="text-muted fw-medium">{% trans "Management Portal" %}</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger border-0 shadow-sm mb-4" style="border-radius: 12px;">
            <i class="bi bi-exclamation-circle me-2"></i> {% trans "Invalid username or password." %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_username" class="form-label text-muted small fw-bold text-uppercase ms-1">{% trans "Username" %}</label>
                <div class="position-relative">
                    <input type="text" name="username" id="id_username" class="form-control" placeholder="Admin username" required>
                </div>
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label text-muted small fw-bold text-uppercase ms-1">{% trans "Password" %}</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-premium">
                    {% trans "LOGIN TO DASHBOARD" %} <i class="bi bi-arrow-right ms-2"></i>
                </button>
            </div>
        </form>
        
        <div class="mt-5 text-center">
            <a href="/" class="text-decoration-none text-muted small fw-bold hover-opacity-100">
                <i class="bi bi-arrow-left me-1"></i> {% trans "Back to Application" %}
            </a>
        </div>
    </div>
</body>
</html>
