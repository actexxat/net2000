{% load i18n static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Internet 2000 - Login</title>
    <link href="{% static 'vendor/bootstrap.min.css' %}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 2rem;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            border-top: 5px solid #dc3545;
        }
        .comic-brand {
            font-family: "Comic Sans MS", "Comic Sans", cursive;
            font-weight: 900;
            color: #dc3545;
            text-align: center;
            margin-bottom: 2rem;
        }
        .btn-danger {
            background-color: #dc3545;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        .btn-danger:hover {
            background-color: #c82333;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(220, 53, 69, 0.3);
        }
        .form-control {
            border-radius: 10px;
            padding: 0.8rem;
            border: 1px solid #dee2e6;
        }
        .form-control:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 0.2rem rgba(220, 53, 69, 0.25);
        }
        .alert {
            border-radius: 10px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="text-center mb-4">
            <img src="{% static 'img/logo.png' %}" alt="Logo" style="width: 80px; height: 80px; margin-bottom: 1rem;">
            <h2 class="comic-brand">INTERNET 2000</h2>
            <p class="text-muted">{% trans "Management Portal" %}</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger">
            {% trans "Invalid username or password. Please try again." %}
        </div>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label for="id_username" class="form-label text-muted small fw-bold text-uppercase">{% trans "Username" %}</label>
                <input type="text" name="username" id="id_username" class="form-control" placeholder="Admin username" required>
            </div>
            <div class="mb-4">
                <label for="id_password" class="form-label text-muted small fw-bold text-uppercase">{% trans "Password" %}</label>
                <input type="password" name="password" id="id_password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-danger">{% trans "LOGIN TO DASHBOARD" %}</button>
            </div>
        </form>
        
        <div class="mt-4 text-center">
            <a href="/" class="text-decoration-none text-muted small">
                <i class="bi bi-arrow-left"></i> {% trans "Back to Application" %}
            </a>
        </div>
    </div>
</body>
</html>
