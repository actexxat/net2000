{% load i18n %}
<div id="notification-stack" hx-swap-oob="beforeend">
    <div class="order-notification show" role="alert">
        <div class="notification-content">
            <div class="notification-icon">
                {% if level == 'error' or level == 'danger' %}
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <circle cx="12" cy="12" r="10"></circle>
                    <line x1="12" y1="8" x2="12" y2="12"></line>
                    <line x1="12" y1="16" x2="12.01" y2="16"></line>
                </svg>
                {% else %}
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                    <polyline points="22 4 12 14.01 9 11.01"></polyline>
                </svg>
                {% endif %}
            </div>
            <div class="notification-text">
                <div class="notification-title">
                    {% if level == 'error' or level == 'danger' %}
                    ⚠️ {% trans "Error" %}
                    {% else %}
                    ✓ {% trans "Success" %}
                    {% endif %}
                </div>
                <div class="notification-message">
                    {% if safe_mode %}{{ message|safe }}{% else %}{{ message }}{% endif %}
                </div>
            </div>
            <button type="button" class="notification-close" onclick="this.closest('.order-notification').remove()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
    </div>
</div>
<script>
    // Auto-dismiss after 5 seconds
    setTimeout(function() {
        var notifications = document.querySelectorAll('.order-notification.show');
        notifications.forEach(n => {
            n.classList.remove('show');
            setTimeout(() => n.remove(), 200);
        });
    }, 3000);
</script>
