<div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1060; pointer-events: none;" hx-swap-oob="beforeend">
    <div class="toast show align-items-center text-white bg-{{ level|default:'success' }} border-0 shadow-lg mb-2 slide-up" role="alert" aria-live="assertive" aria-atomic="true" style="pointer-events: auto;">
        <div class="d-flex">
            <div class="toast-body fw-bold">
                {% if level == 'error' %}
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                {% else %}
                <i class="bi bi-check-circle-fill me-2"></i>
                {% endif %}
                {% if safe_mode %}{{ message|safe }}{% else %}{{ message }}{% endif %}
            </div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close" onclick="this.closest('.toast').remove()"></button>
        </div>
    </div>
    <script>
        // Auto-remove after 3 seconds
        setTimeout(function() {
            var toasts = document.querySelectorAll('.toast.show');
            toasts.forEach(t => {
                t.classList.remove('show');
                setTimeout(() => t.remove(), 300);
            });
        }, 3000);
    </script>
</div>
<style>
    .slide-up {
        animation: slideUp 0.3s ease-out;
    }
    @keyframes slideUp {
        from { transform: translateY(100%); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }
</style>
