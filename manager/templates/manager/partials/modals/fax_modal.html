{% load i18n manager_extras %}
<div class="modal fade" id="faxModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">{% trans "Fax" %} - {% trans "Table" %} {{ table.number|translate_numbers }}
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form hx-post="{% url 'add_fax' table.id %}" hx-target="#table-card-{{ table.id }}" hx-swap="outerHTML">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">{% trans "Number of papers" %}</label>
                        <input type="number" name="pages" min="1" value="1" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{% trans "Total Cost (EGP)" %}</label>
                        <input type="number" name="cost" step="0.5" class="form-control" placeholder="e.g. 10.00" required>
                    </div>
                    <div class="form-text">{% trans "Cost: EGP 5.00 per paper (suggested)" %}</div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">{% trans "Cancel" %}</button>
                    <button type="submit" class="btn btn-info text-white" data-bs-dismiss="modal">
                        {% trans "Add Fax to Bill" %}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<script>
    (function() {
        var modalEl = document.getElementById('faxModal');
        if (!modalEl) return;

        function cleanup() {
            document.querySelectorAll('.modal-backdrop').forEach(b => b.remove());
            document.body.classList.remove('modal-open');
            document.body.style.overflow = '';
            document.body.style.paddingRight = '';
        }

        cleanup();

        var myModal = new bootstrap.Modal(modalEl);
        myModal.show();

        modalEl.addEventListener('hidden.bs.modal', function () {
            myModal.dispose();
            modalEl.remove();
            cleanup();
        });
    })();
</script>
