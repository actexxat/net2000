{% load i18n %}
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% trans "System Update" %}</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .update-container {
            width: 100%;
            max-width: 600px;
        }
    </style>
</head>
<body>
    <div style="display:none">{% csrf_token %}</div>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 update-container">
                <div class="text-center mb-4">
                    <h2>{% trans "System Update" %}</h2>
                    <p class="text-muted">{% trans "Please update your system to continue." %}</p>
                </div>
                
                <!-- Include the existing update checker partial -->
                {% include "manager/update_checker.html" %}
                
                <div class="text-center mt-3">
                    <a href="{% url 'dashboard' %}" class="btn btn-link text-decoration-none">
                        <i class="bi bi-arrow-left me-1"></i> {% trans "Back to Dashboard" %}
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
