{% load i18n %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% trans "Log in | Admin" %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="d-flex align-items-center justify-content-center" style="min-height:80vh;">
    <div class="login-card p-4" style="background:#fff; border-radius:8px; max-width:420px; width:100%;">
        <h2 class="mb-1 align-items-center">{% trans "Admin Login" %}</h2>

        {% if form.errors %}
            <div class="alert alert-danger">{% trans "Invalid credentials, please try again." %}</div>
        {% endif %}

        <form method="post" class="mb-3">
            {% csrf_token %}
            <div class="mb-3">
                <input type="text" name="username" class="form-control" placeholder="{% trans 'Username' %}" aria-label="{% trans 'Username' %}" required>
            </div>
            <div class="mb-3">
                <input type="password" name="password" class="form-control" placeholder="{% trans 'Password' %}" aria-label="{% trans 'Password' %}" required>
            </div>
            <button type="submit" class="btn btn-danger w-100 mb-2">{% trans "Log In" %}</button>
        </form>

        <div class="d-flex gap-2">
            <a href="{% url 'dashboard' %}" class="btn btn-secondary w-50">{% trans "Home" %}</a>
            <a href="/admin/password_reset/" class="btn btn-link w-50">{% trans "Forgot password?" %}</a>
        </div>
    </div>
</div>

<style>
.login-card h2{font-size:20px; margin:0 0 6px}
.login-card p{color:#6b7280}
.login-card{ text-align:center; }
.login-card form{ display:flex; flex-direction:column; align-items:center; }
.login-card .form-control{ margin:0 auto; display:block; max-width:320px; }
.login-card .form-control::placeholder{ color:#9aa0a6; }
.login-card .btn{ min-width:140px; }
.login-card .d-flex.gap-2 a.btn{ width:48%; }
</style>
</body>
</html>
